name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem with Orbit Webform.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the problem.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Install/enable...
        2. Configure...
        3. Visit...
        4. See...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: drupal-version
    attributes:
      label: Drupal version
      placeholder: "11.3.x"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.4.x"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: Orbit Webform version
      placeholder: "1.0.0 or commit hash"

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste any relevant Drupal logs, PHPUnit output, or stack traces.
      render: shell

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add screenshots, related config, or anything else useful.
