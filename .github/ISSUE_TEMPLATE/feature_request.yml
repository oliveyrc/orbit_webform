name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to Orbit Webform.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What need should this feature solve?
      placeholder: Describe the workflow, limitation, or user need.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or change you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workaround or alternative approach you have considered.

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits from this and how often would it be used?

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add mockups, related issues, examples, or implementation notes.
