    module:
      - orbit_webform
id: form_elements
title: 'Form elements'
description: 'Example webform containing all element types allowed by the Orbit Webform module.'
category: ''
elements: |
  textfield_example:
    '#type': textfield
    '#title': Textfield
    '#description': 'Use this for short single-line answers.'
    '#required': true
  textarea_example:
    '#type': textarea
    '#title': Textarea
  email_example:
    '#type': email
    '#title': Email
    '#required': true
  telephone_example:
    '#type': tel
    '#title': Telephone
  number_example:
    '#type': number
    '#title': Number
    '#min': 0
    '#max': 10
    '#step': 1
  select_example:
    '#type': select
    '#title': Select
    '#description': 'Use this when only one option should be selected.'
    '#options':
      option_one: 'Option one'
      option_two: 'Option two'
      option_three: 'Option three'
  checkbox_example:
    '#type': checkbox
    '#title': Checkbox
  checkboxes_example:
    '#type': checkboxes
    '#title': Checkboxes
    '#options':
      option_one: 'Option one'
      option_two: 'Option two'
      option_three: 'Option three'
  radios_example:
    '#type': radios
    '#title': Radios
    '#options':
      option_one: 'Option one'
      option_two: 'Option two'
      option_three: 'Option three'
  date_example:
    '#type': date
    '#title': Date
  captcha_example:
    '#type': captcha
    '#title': CAPTCHA
  markup_example:
    '#type': webform_markup
    '#markup': '<p>This is an example markup element.</p>'
  managed_file_example:
    '#type': managed_file
    '#title': 'Managed file'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
